apiVersion: v1
kind: Secret
metadata:
  name: school-mgmt-secret
  labels:
    app: school-mgmt
type: Opaque
# Values are base64-encoded. To encode: echo -n 'value' | base64
# postgres              -> cG9zdGdyZXM=
# 12345                 -> MTIzNDU=
# 12345678              -> MTIzNDU2Nzg=
# my_csrf_secret        -> bXlfY3NyZl9zZWNyZXQ=
# 863yncir8bc2r         -> ODYzeW5jaXI4YmMycg==
# gwdigwidw             -> Z3dkaWd3aWR3
# re_123456789          -> cmVfMTIzNDU2Nzg5
# apikey_123456789      -> YXBpa2V5XzEyMzQ1Njc4OQ==
# nodejs_123456789      -> bm9kZWpzXzEyMzQ1Njc4OQ==
stringData:
  # Use stringData for convenience — Kubernetes will base64-encode automatically
  POSTGRES_PASSWORD: "postgres"
  DB_PASSWORD: "postgres"

  JWT_ACCESS_TOKEN_SECRET: "12345"
  JWT_REFRESH_TOKEN_SECRET: "12345678"
  CSRF_TOKEN_SECRET: "my_csrf_secret"

  EMAIL_VERIFICATION_TOKEN_SECRET: "863yncir8bc2r"
  PASSWORD_SETUP_TOKEN_SECRET: "gwdigwidw"

  RESEND_API_KEY: "re_123456789"
  API_KEY: "apikey_123456789"
  NODEJS_API_KEY: "nodejs_123456789"
  VITE_API_KEY: "apikey_123456789"