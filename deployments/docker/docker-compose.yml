services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: school_mgmt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

    networks:
      - app-network

  seeder:
    build:
      context: ../../seed_db
      dockerfile: Dockerfile
    container_name: seeder
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: school_mgmt
    networks:
      - app-network

  backend:
    build:
      context: ../../backend
    container_name: backend
    ports:
      - "5007:5007"
    environment:
      PORT: 5007
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/school_mgmt

      JWT_ACCESS_TOKEN_SECRET: 12345
      JWT_REFRESH_TOKEN_SECRET: 12345678
      CSRF_TOKEN_SECRET: my_csrf_secret

      JWT_ACCESS_TOKEN_TIME_IN_MS: 900000
      JWT_REFRESH_TOKEN_TIME_IN_MS: 28800000
      CSRF_TOKEN_TIME_IN_MS: 950000

      MAIL_FROM_USER: your-desired-name@domain-name.com

      EMAIL_VERIFICATION_TOKEN_SECRET: 863yncir8bc2r
      EMAIL_VERIFICATION_TOKEN_TIME_IN_MS: 18000000

      PASSWORD_SETUP_TOKEN_TIME_IN_MS: 300000
      PASSWORD_SETUP_TOKEN_SECRET: gwdigwidw

      UI_URL: http://localhost:3000
      API_URL: http://backend:5007

      COOKIE_DOMAIN: localhost
      RESEND_API_KEY: re_123456789
      API_KEY: apikey_123456789
      NODEJS_API_KEY: nodejs_123456789


    depends_on:
      - postgres
    networks:
      - app-network

  pdf-service:
    build:
      context: ../../Go-service
      dockerfile: Dockerfile
    container_name: pdf-service
    ports:
      - "8082:8080"
    environment:
      PORT: "8080"
      NODEJS_BASE_URL: "http://backend:5007" # use service name, not localhost
      ALLOWED_ORIGIN: "http://localhost:3000"
      NODEJS_API_KEY: nodejs_123456789
      API_KEY: apikey_123456789
      NODEJS_TIMEOUT: "10s"
      RATE_LIMIT: "100"
      LOG_LEVEL: "info"
      PDF_OUTPUT_DIR: "/tmp/pdfs"
      MAX_PDF_SIZE: "10485760"
    depends_on:
      - backend
    networks:
      - app-network

  frontend:
    build:
      context: ../../frontend
      args:
        VITE_API_KEY: "apikey_123456789"
        VITE_REPORT_API_URL: "http://localhost:8082"
        VITE_API_URL: "http://localhost:5007"
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://localhost:5007"
      VITE_REPORT_API_URL: "http://localhost:8082"
      VITE_API_KEY: "apikey_123456789"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
